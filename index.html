<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phân Tích Chứng Chỉ Quỹ Việt Nam</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-950 text-gray-200 min-h-screen font-sans">
    <!-- Header -->
    <header class="bg-gray-900 border-b border-gray-800">
      <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <div class="flex items-center justify-between h-14">
          <a href="index.html" class="flex items-center gap-2.5 group">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/>
              </svg>
            </div>
            <span class="text-white font-bold text-lg hidden sm:block group-hover:text-blue-400 transition-colors">FundTracker</span>
          </a>
          <nav class="flex items-center gap-1">
            <a href="index.html" class="px-3 py-1.5 text-sm font-medium rounded-lg bg-gray-800 text-white">Danh sách</a>
            <a href="compare.html" class="px-3 py-1.5 text-sm font-medium rounded-lg text-gray-400 hover:text-white hover:bg-gray-800/50 transition-colors">So sánh</a>
            <a href="dca.html" class="px-3 py-1.5 text-sm font-medium rounded-lg text-gray-400 hover:text-white hover:bg-gray-800/50 transition-colors">DCA</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
      <!-- Search & Filters -->
      <div class="mb-6">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input
            id="searchInput"
            type="text"
            placeholder="Tìm theo tên quỹ, mã quỹ, công ty quản lý..."
            class="w-full bg-gray-900 border border-gray-700 rounded-lg py-2.5 pl-10 pr-4 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors"
          />
        </div>
      </div>

      <!-- Type Filters -->
      <div class="flex flex-wrap gap-2 mb-6">
        <button data-type="FAV" class="px-3 py-1.5 text-sm rounded-lg border bg-gray-800 border-gray-700 text-gray-300 hover:bg-gray-700 transition-colors inline-flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          Yêu thích
        </button>
        <button data-type="ALL" class="px-3 py-1.5 text-sm rounded-lg border bg-blue-600 border-blue-500 text-white transition-colors">
          Tất cả
        </button>
        <button data-type="STOCK" class="px-3 py-1.5 text-sm rounded-lg border bg-gray-800 border-gray-700 text-gray-300 hover:bg-gray-700 transition-colors">
          Cổ phiếu
        </button>
        <button data-type="BOND" class="px-3 py-1.5 text-sm rounded-lg border bg-gray-800 border-gray-700 text-gray-300 hover:bg-gray-700 transition-colors">
          Trái phiếu
        </button>
        <button data-type="BALANCED" class="px-3 py-1.5 text-sm rounded-lg border bg-gray-800 border-gray-700 text-gray-300 hover:bg-gray-700 transition-colors">
          Cân bằng
        </button>
      </div>

      <!-- Fund Count -->
      <div class="mb-4 text-sm text-gray-400">
        <span id="fundCount">Đang tải...</span>
      </div>

      <!-- Loading -->
      <div id="loader" class="flex items-center justify-center py-20">
        <div class="flex items-center gap-3">
          <svg class="animate-spin h-5 w-5 text-blue-500" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          <span class="text-gray-400">Đang tải dữ liệu quỹ...</span>
        </div>
      </div>

      <!-- Fund Table -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-gray-800 text-gray-400 text-xs uppercase tracking-wider">
                <th class="py-3 px-4 text-left font-medium cursor-pointer hover:text-white transition-colors w-1/2 select-none" data-sort="name">
                  <span class="inline-flex items-center gap-1">Quỹ
                    <span class="inline-flex flex-col leading-none text-[9px] gap-[1px]">
                      <span class="sort-up text-gray-600">▲</span>
                      <span class="sort-down text-gray-600">▼</span>
                    </span>
                  </span>
                </th>
                <th class="py-3 px-4 text-left font-medium hidden md:table-cell cursor-pointer hover:text-white transition-colors select-none" data-sort="type">
                  <span class="inline-flex items-center gap-1">Loại
                    <span class="inline-flex flex-col leading-none text-[9px] gap-[1px]">
                      <span class="sort-up text-gray-600">▲</span>
                      <span class="sort-down text-gray-600">▼</span>
                    </span>
                  </span>
                </th>
                <th class="py-3 px-4 text-right font-medium cursor-pointer hover:text-white transition-colors select-none" data-sort="nav">
                  <span class="inline-flex items-center gap-1 justify-end">NAV
                    <span class="inline-flex flex-col leading-none text-[9px] gap-[1px]">
                      <span class="sort-up text-gray-600">▲</span>
                      <span class="sort-down text-gray-600">▼</span>
                    </span>
                  </span>
                </th>
                <th class="py-3 px-4 text-right font-medium select-none" data-sort="perf">
                  <span class="inline-flex items-center gap-1 justify-end">
                    <select id="perfPeriodSelect" class="bg-gray-900 border border-gray-700 rounded-lg px-2 py-1 text-xs text-gray-300 focus:outline-none focus:border-blue-500 cursor-pointer">
                      <option value="navTo1Months">1 Tháng</option>
                      <option value="navTo3Months">3 Tháng</option>
                      <option value="navTo6Months">6 Tháng</option>
                      <option value="navTo12Months">1 Năm</option>
                      <option value="navTo24Months">2 Năm</option>
                      <option value="navTo36Months">3 Năm</option>
                      <option value="navTo60Months">5 Năm</option>
                      <option value="navToBeginning">Từ đầu</option>
                    </select>
                    <span class="inline-flex flex-col leading-none text-[9px] gap-[1px] cursor-pointer">
                      <span class="sort-up text-gray-600">▲</span>
                      <span class="sort-down text-gray-600">▼</span>
                    </span>
                  </span>
                </th>
              </tr>
            </thead>
            <tbody id="fundTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script type="module" src="js/list.js"></script>
  </body>
</html>
